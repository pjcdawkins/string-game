name: CI

# Deterministic quality gate: lint, type-check, unit tests, and a production
# build. These are fast and reproducible, so they run on every push to main and
# on every pull request. The Playwright e2e smoke test is intentionally kept as
# a local-only command (`npm run e2e`): it drives real WebAudio DSP with tight
# timing tolerances and is too flaky for a shared CI runner to gate merges on.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: the checks only need to read the repository.
permissions:
  contents: read

# A newer push to the same branch/PR supersedes in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # current Active LTS
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
