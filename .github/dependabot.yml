version: 2
updates:
  # Keep the GitHub Actions used in workflows patched (checkout, setup-node…).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep npm dev tooling current. Grouped into one PR per week to limit noise;
  # runtime deps get their own PRs so they are reviewed individually.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
